  <button class="nb" id="nav-subjects" onclick="goTo('subjects')"><span class="ico">&#128216;</span>সাবজেক্ট</button>
  <button class="nb" id="nav-stats" onclick="goTo('stats')"><span class="ico">&#128202;</span>স্ট্যাটস</button>
  <button class="nb" id="nav-settings" onclick="goTo('settings')"><span class="ico">&#9881;</span>সেটিংস</button>
</nav>

<script>
// ===== DATA =====
const QUOTES=[
  "সাফল্য হলো প্রতিদিন একটু একটু করে এগিয়ে যাওয়া।",
  "পরীক্ষায় ভালো করতে হলে এখনই শুরু করো।",
  "ছোট ছোট পদক্ষেপই বড় স্বপ্ন পূরণ করে।",
  "আজকের পরিশ্রম আগামীর সাফল্য।",
  "মনোযোগ দিয়ে পড়লে কঠিন কিছুই থাকে না।",
  "প্রতিটি Pomodoro তোমাকে লক্ষ্যের কাছে নিয়ে যায়।",
  "জ্ঞানই শক্তি, পড়াশোনাই পথ।",
  "ধৈর্য ধরো, ফল আসবেই।",
  "আজ যে পরিশ্রম করবে, কাল তার ফল পাবে।",
  "স্বপ্ন দেখো, পরিকল্পনা করো, কাজে লাগো।",
  "প্রতিটি বই একটি নতুন দুনিয়ার দরজা।",
  "সফলতার কোনো শর্টকাট নেই।"
];
const DS=['বাংলা ১ম','বাংলা ২য়','ইংরেজি ১ম','ইংরেজি ২য়','ইতিহাস','ইসলাম শিক্ষা','পৌরনীতি','অর্থনীতি','সমাজবিজ্ঞান','ভূগোল','যুক্তিবিদ্যা','সমাজকর্ম'];
const ACH=[
  {id:'s1',e:'⭐',l:'প্রথম সেশন',c:d=>d.totalS>=1},
  {id:'s5',e:'🏅',l:'৫টি সেশন',c:d=>d.totalS>=5},
  {id:'s10',e:'🏆',l:'১০টি সেশন',c:d=>d.totalS>=10},
  {id:'s25',e:'👑',l:'২৫টি সেশন',c:d=>d.totalS>=25},
  {id:'m60',e:'⏰',l:'১ ঘণ্টা পড়া',c:d=>d.totalM>=60},
  {id:'m120',e:'💎',l:'২ ঘণ্টা পড়া',c:d=>d.totalM>=120},
  {id:'str3',e:'🔥',l:'৩ দিন স্ট্রিক',c:d=>d.streak>=3},
  {id:'str7',e:'🌟',l:'৭ দিন স্ট্রিক',c:d=>d.streak>=7},
  {id:'td5',e:'✅',l:'৫ কাজ সম্পন্ন',c:d=>(d.todos||[]).filter(t=>t.done).length>=5},
  {id:'n5',e:'📝',l:'৫টি নোট',c:d=>(d.notes||[]).length>=5},
  {id:'a6',e:'📚',l:'৬ সাবজেক্ট',c:d=>Object.keys(d.sm||{}).length>=6},
];
const THEMES={
  dark:{bg:'#0d0d1a',bg2:'#12122a',bg3:'#1a1a35'},
  night:{bg:'#050510',bg2:'#080820',bg3:'#0e0e28'},
  nature:{bg:'#0a150a',bg2:'#0f1a0f',bg3:'#131f13'},
  ocean:{bg:'#050f1a',bg2:'#0a1525',bg3:'#0f1e30'},
  sunset:{bg:'#1a0d0a',bg2:'#251210',bg3:'#301818'},
  forest:{bg:'#0a120a',bg2:'#101a10',bg3:'#152015'},
};

// ===== STATE =====
let D={
  subjs:DS.map(n=>({name:n,mins:0,notes:{general:'',important:'',questions:'',exam:'',formula:''}})),
  todos:[],notes:[],log:[],
  totalS:0,todayS:0,totalM:0,streak:0,xp:0,lv:1,
  wk:[0,0,0,0,0,0,0],sm:{},lastD:'',
  eDate:'',eType:'SSC',
  gP:6,gH:3,snd:'bell',theme:'dark',
};
function ld(){
  try{const s=localStorage.getItem('sm25');if(s)Object.assign(D,JSON.parse(s));}catch(e){}
  const t=new Date().toDateString();
  if(D.lastD&&D.lastD!==t){
    const df=(new Date(t)-new Date(D.lastD))/864e5;
    if(df>1)D.streak=0;
    D.todayS=0;
  }
}
function sv(){try{localStorage.setItem('sm25',JSON.stringify(D));}catch(e){}}

// ===== AUDIO =====
let actx=null,uAud=null,rAud=null,vLvl=.7,selSndId='bell';
let mrec=null,rch=[],isRec=false;
function gac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function playS(t){
  try{const c=gac();
    if(t==='bell'){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(vLvl,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+2);o.start();o.stop(c.currentTime+2);}
    else if(t==='chime'){[523,659,784,1046].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(vLvl*.5,c.currentTime+i*.25);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.25+1.2);o.start(c.currentTime+i*.25);o.stop(c.currentTime+i*.25+1.2);});}
    else if(t==='beep'){[0,.4,.8].forEach(d=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=1100;o.type='square';g.gain.setValueAtTime(vLvl*.3,c.currentTime+d);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d+.2);o.start(c.currentTime+d);o.stop(c.currentTime+d+.2);});}
    else if(t==='nature'){[400,600,500,800,650].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(vLvl*.3,c.currentTime+i*.25);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.25+.4);o.start(c.currentTime+i*.25);o.stop(c.currentTime+i*.25+.4);});}
  }catch(e){}
}
function prvSnd(t){playS(t);}
function playAlm(){
  if(selSndId==='custom'&&uAud){uAud.currentTime=0;uAud.play();}
  else if(selSndId==='voice'&&rAud){rAud.currentTime=0;rAud.play();}
  else playS(selSndId);
  if(document.getElementById('vib-tog').classList.contains('on')&&navigator.vibrate)navigator.vibrate([300,100,300,100,300]);
}
function selSnd(t){
  selSndId=t;D.snd=t;
  document.querySelectorAll('.so').forEach(e=>e.classList.remove('on'));
  const el=document.getElementById('snd-'+t);if(el)el.classList.add('on');
  sv();
}
function loadAud(inp){
  const f=inp.files[0];if(!f)return;
  uAud=new Audio(URL.createObjectURL(f));uAud.volume=vLvl;
  document.getElementById('csnd-name').textContent=f.name.substring(0,22);
  document.getElementById('csnd-wrap').style.display='block';
  selSnd('custom');toast('অডিও যোগ হয়েছে');
}
async function togRec(){
  if(!isRec){
    try{
      const s=await navigator.mediaDevices.getUserMedia({audio:true});
      mrec=new MediaRecorder(s);rch=[];
      mrec.ondataavailable=e=>{if(e.data.size>0)rch.push(e.data);};
      mrec.onstop=()=>{
        const b=new Blob(rch,{type:'audio/webm'});
        rAud=new Audio(URL.createObjectURL(b));rAud.volume=vLvl;
        selSnd('voice');
        document.getElementById('rec-st').textContent='ভয়েস রেকর্ড সম্পন্ন ✓';
        s.getTracks().forEach(t=>t.stop());
        toast('ভয়েস অ্যালার্ম সেট!');
      };
      mrec.start();isRec=true;
      document.getElementById('rec-btn').textContent='⏹ রেকর্ড বন্ধ';
      document.getElementById('rec-st').textContent='🔴 রেকর্ড চলছে...';
    }catch(e){toast('মাইক্রোফোন অ্যাক্সেস দাও');}
  }else{
    if(mrec&&mrec.state!=='inactive')mrec.stop();
    isRec=false;
    document.getElementById('rec-btn').textContent='🎙 রেকর্ড শুরু';
  }
}

// ===== TIMER =====
let sM=25,bM=5,sL=25*60,tS=25*60,tOn=false,onBk=false,tInt=null,doneT=0,cSI=0;
function setMode(m,el){
  document.querySelectorAll('.mo').forEach(e=>e.classList.remove('on'));el.classList.add('on');
  document.getElementById('crow').style.display=m==='custom'?'block':'none';
  if(m==='25/5'){sM=25;bM=5;}else if(m==='15/5'){sM=15;bM=5;}else if(m==='45/10'){sM=45;bM=10;}
  if(m!=='custom'&&!tOn)resetT();
}
function applyC(){sM=Math.max(1,+document.getElementById('c-st').value||25);bM=Math.max(1,+document.getElementById('c-br').value||5);if(!tOn)resetT();toast('কাস্টম: '+sM+'m/'+bM+'m');}
function togTimer(){
  if(tOn){clearInterval(tInt);tOn=false;document.getElementById('t-play').innerHTML='&#9654;';}
  else{tOn=true;document.getElementById('t-play').innerHTML='&#9646;&#9646;';tInt=setInterval(tick,1000);}
}
function tick(){sL--;if(sL<0){sessDone();return;}updD();updR(sL/tS);}
function sessDone(){
  clearInterval(tInt);tOn=false;document.getElementById('t-play').innerHTML='&#9654;';
  playAlm();
  if(!onBk){
    doneT++;D.totalS++;D.todayS++;
    const sj=D.subjs[cSI];
    if(sj){sj.mins=(sj.mins||0)+sM;D.sm=D.sm||{};D.sm[sj.name]=(D.sm[sj.name]||0)+sM;}
    D.totalM+=sM;D.xp=(D.xp||0)+30;
    if(D.xp>=100*D.lv){D.lv++;D.xp-=100*(D.lv-1);toast('Level Up! Level '+D.lv+'!');}
    D.wk[new Date().getDay()]=(D.wk[new Date().getDay()]||0)+sM;
    const td=new Date().toDateString();
    if(D.lastD&&D.lastD!==td){const df=(new Date(td)-new Date(D.lastD))/864e5;D.streak=df<=1?(D.streak||0)+1:1;}
    else if(!D.lastD)D.streak=1;
    D.lastD=td;
    D.log.unshift({sj:sj?sj.name:'—',m:sM,t:new Date().toLocaleTimeString('bn-BD',{hour:'2-digit',minute:'2-digit'})});
    if(D.log.length>30)D.log.pop();
    sv();toast('দারুণ! সেশন শেষ! বিরতি নাও।');
    if(document.getElementById('auto-brk').classList.contains('on')){
      onBk=true;tS=bM*60;sL=tS;
      setBan(true);
      tOn=true;document.getElementById('t-play').innerHTML='&#9646;&#9646;';tInt=setInterval(tick,1000);
    }
  }else{
    onBk=false;tS=sM*60;sL=tS;setBan(false);toast('বিরতি শেষ! পড়তে বসো!');
  }
  updD();updR(1);renderDots();updTI();
}
function setBan(b){
  const el=document.getElementById('t-ban');
  el.className='mbn '+(b?'bk':'st');
  el.textContent=b?'☕ বিরতির সময়!':'📖 পড়াশোনার সময়';
  document.getElementById('t-sub').textContent=b?'বিরতি':'Pomodoro';
}
function skipS(){clearInterval(tInt);tOn=false;onBk=!onBk;tS=(onBk?bM:sM)*60;sL=tS;setBan(onBk);document.getElementById('t-play').innerHTML='&#9654;';updD();updR(1);}
function resetT(){clearInterval(tInt);tOn=false;onBk=false;tS=sM*60;sL=tS;updD();updR(1);document.getElementById('t-play').innerHTML='&#9654;';setBan(false);}
function updD(){const m=Math.floor(sL/60),s=sL%60;document.getElementById('t-disp').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
function updR(f){const c=2*Math.PI*96;document.getElementById('t-ring').style.strokeDashoffset=c*(1-f);document.getElementById('t-ring').style.stroke=onBk?'#1d9e75':'#7f77dd';}
function updTI(){
  const g=+document.getElementById('g-p').value||6;
  document.getElementById('t-sn2').textContent=D.todayS+1;
  document.getElementById('t-dn').textContent=doneT;
  document.getElementById('t-str').textContent=D.streak||0;
  document.getElementById('t-xp').textContent=D.xp||0;
  document.getElementById('t-gtxt').textContent=doneT+'/'+g;
  document.getElementById('t-gf').style.width=Math.min(100,Math.round(doneT/g*100))+'%';
}
function renderDots(){
  const g=Math.min(+document.getElementById('g-p').value||6,14);
  const c=document.getElementById('t-dots');c.innerHTML='';
  for(let i=0;i<g;i++){const d=document.createElement('div');d.className='dot'+(i<doneT?' done':i===doneT?' cur':'');c.appendChild(d);}
}
function prevS(){cSI=(cSI-1+D.subjs.length)%D.subjs.length;document.getElementById('t-sn').textContent=D.subjs[cSI].name;}
function nextS(){cSI=(cSI+1)%D.subjs.length;document.getElementById('t-sn').textContent=D.subjs[cSI].name;}

// ===== TODO =====
let tdEId=null,tdF='all';
function openTM(){
  tdEId=null;
  document.getElementById('tm-title').textContent='নতুন কাজ যোগ করো';
  ['tm-text','tm-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('tm-dl').value='';
  document.getElementById('tm-pri').value='mid';
  updTmSubj();
  document.getElementById('td-modal').classList.add('open');
  setTimeout(()=>document.getElementById('tm-text').focus(),200);
}
function closeTM(){document.getElementById('td-modal').classList.remove('open');}
function updTmSubj(){const s=document.getElementById('tm-subj');s.innerHTML='<option value="">সাবজেক্ট (ঐচ্ছিক)</option>'+D.subjs.map(x=>`<option>${x.name}</option>`).join('');}
function saveTodo(){
  const t=document.getElementById('tm-text').value.trim();if(!t){toast('কাজের বিবরণ লেখো!');return;}
  const td={id:tdEId||Date.now(),text:t,desc:document.getElementById('tm-desc').value.trim(),subj:document.getElementById('tm-subj').value,pri:document.getElementById('tm-pri').value,dl:document.getElementById('tm-dl').value,done:false,cr:new Date().toISOString()};
  if(tdEId){const i=D.todos.findIndex(x=>x.id===tdEId);if(i>=0){td.done=D.todos[i].done;D.todos[i]=td;}}
  else D.todos.unshift(td);
  sv();closeTM();renderTodo();toast(tdEId?'আপডেট হয়েছে':'কাজ যোগ হয়েছে');
}
function togTodo(id){const t=D.todos.find(x=>x.id===id);if(!t)return;t.done=!t.done;if(t.done){D.xp=(D.xp||0)+10;toast('+10 XP!')}sv();renderTodo();}
function delTodo(id){D.todos=D.todos.filter(x=>x.id!==id);sv();renderTodo();}
function editTodo(id){
  const t=D.todos.find(x=>x.id===id);if(!t)return;
  tdEId=id;document.getElementById('tm-title').textContent='কাজ সম্পাদনা';
  document.getElementById('tm-text').value=t.text;
  document.getElementById('tm-desc').value=t.desc||'';
  document.getElementById('tm-dl').value=t.dl||'';
  document.getElementById('tm-pri').value=t.pri||'mid';
  updTmSubj();document.getElementById('tm-subj').value=t.subj||'';
  document.getElementById('td-modal').classList.add('open');
}
function fTodo(f,el){tdF=f;document.querySelectorAll('#td-flt .tag').forEach(e=>e.classList.remove('on'));el.classList.add('on');renderTodo();}
function renderTodo(){
  const all=D.todos||[];
  let fl=all;
  if(tdF==='pend')fl=all.filter(t=>!t.done);
  else if(tdF==='done')fl=all.filter(t=>t.done);
  else if(['high','mid','low'].includes(tdF))fl=all.filter(t=>t.pri===tdF);
  const pc={'high':'ph','mid':'pm','low':'pl'};
  document.getElementById('td-list').innerHTML=fl.map(t=>`
    <div class="tdi${t.done?' done':''}">
      <div class="pr ${pc[t.pri]||'pm'}"></div>
      <div class="chk${t.done?' on':''}" onclick="togTodo(${t.id})">${t.done?'&#10003;':''}</div>
      <div class="tt" onclick="editTodo(${t.id})">
        <div class="ttx">${t.text}</div>
        ${t.subj||t.dl?`<div class="tmt">${t.subj?'📚 '+t.subj:''}${t.subj&&t.dl?' · ':''}${t.dl?'⏰ '+t.dl:''}</div>`:''}
        ${t.desc?`<div style="font-size:11px;color:var(--text3);margin-top:3px">${t.desc.substring(0,60)}${t.desc.length>60?'...':''}</div>`:''}
      </div>
      <button class="tdl" onclick="delTodo(${t.id})">&#215;</button>
    </div>`).join('');
  const dn=all.filter(t=>t.done).length;
  document.getElementById('td-tot').textContent=all.length;
  document.getElementById('td-dn').textContent=dn;
  document.getElementById('td-pd').textContent=all.length-dn;
  document.getElementById('td-pc').textContent=all.length?Math.round(dn/all.length*100)+'%':'0%';
  document.getElementById('td-pb').style.width=all.length?Math.round(dn/all.length*100)+'%':'0%';
  document.getElementById('td-empty').style.display=fl.length?'none':'block';
}

// ===== NOTES =====
let cNId=null;
function openNE(id){
  cNId=id;
  document.getElementById('nlist-v').style.display='none';
  document.getElementById('ned-v').style.display='block';
  updNSubjs();
  document.getElementById('n-delbtn').style.display=id!==-1?'inline-flex':'none';
  if(id!==-1){
    const n=D.notes.find(x=>x.id===id);
    if(n){document.getElementById('n-title').value=n.title;document.getElementById('n-body').value=n.body;document.getElementById('n-sbj').value=n.subj||'';document.getElementById('n-type').value=n.type||'general';}
  }else{
    document.getElementById('n-title').value='';document.getElementById('n-body').value='';
    document.getElementById('n-sbj').value='';document.getElementById('n-type').value='general';
  }
  updNCnt();
}
function closeNE(){document.getElementById('ned-v').style.display='none';document.getElementById('nlist-v').style.display='block';renderNotes();}
function saveNote(){
  const title=document.getElementById('n-title').value.trim();
  const body=document.getElementById('n-body').value.trim();
  if(!title&&!body){toast('নোটে কিছু লেখো!');return;}
  const n={id:cNId!==-1?cNId:Date.now(),title:title||'শিরোনামহীন',body,subj:document.getElementById('n-sbj').value,type:document.getElementById('n-type').value,upd:new Date().toISOString()};
  if(cNId!==-1){const i=D.notes.findIndex(x=>x.id===cNId);if(i>=0)D.notes[i]=n;}
  else D.notes.unshift(n);
  sv();closeNE();toast('নোট সেভ হয়েছে');
}
function deleteNote(){if(!confirm('এই নোট মুছবে?'))return;D.notes=D.notes.filter(x=>x.id!==cNId);sv();closeNE();toast('নোট মুছে গেছে');}
function updNCnt(){document.getElementById('n-cnt').textContent=document.getElementById('n-body').value.length+' অক্ষর';}
function updNSubjs(){
  const ops='<option value="">সাবজেক্ট (ঐচ্ছিক)</option>'+D.subjs.map(s=>`<option>${s.name}</option>`).join('');
  document.getElementById('n-sbj').innerHTML=ops;
  document.getElementById('n-fsbj').innerHTML='<option value="">সব সাবজেক্ট</option>'+D.subjs.map(s=>`<option>${s.name}</option>`).join('');
}
function renderNotes(){
  const q=document.getElementById('n-srch').value.toLowerCase();
  const sf=document.getElementById('n-fsbj').value;
  const ty={general:'📄',important:'⭐',questions:'❓',exam:'📋',formula:'🔢',summary:'📌'};
  let ns=D.notes||[];
  if(q)ns=ns.filter(n=>n.title.toLowerCase().includes(q)||n.body.toLowerCase().includes(q));
  if(sf)ns=ns.filter(n=>n.subj===sf);
  document.getElementById('n-cards').innerHTML=ns.map(n=>{
    const d=new Date(n.upd);
    const ds=d.toLocaleDateString('bn-BD',{month:'short',day:'numeric'});
    return `<div class="nc" onclick="openNE(${n.id})">
      <div class="nt">${ty[n.type]||'📄'} ${n.title}</div>
      <div class="np">${n.body||'(খালি নোট)'}</div>
      <div class="nm">${n.subj?`<span class="nst">${n.subj}</span>`:''}<span>${ds}</span><span>${n.body.length} অক্ষর</span></div>
    </div>`;
  }).join('');
  document.getElementById('n-empty').style.display=ns.length?'none':'block';
}

// ===== SUBJECTS =====
let selSI=-1,snTag='general';
function renderSubjs(){
  const g=document.getElementById('s-grid');g.innerHTML='';
  const tot=D.subjs.reduce((a,s)=>a+(s.mins||0),0)||1;
  D.subjs.forEach((s,i)=>{
    const pct=Math.round((s.mins||0)/tot*100);
    const isDef=DS.includes(s.name);
    const d=document.createElement('div');
    d.className='sc'+(selSI===i?' on':'');
    d.innerHTML=`<div class="sn">${s.name}</div><div class="sm">${s.mins||0} মিনিট পড়া</div><div class="sbar"><div class="sbf" style="width:${pct}%"></div></div>${!isDef?`<button class="sd" onclick="event.stopPropagation();delSubj(${i})">&#215;</button>`:''}`;
    d.onclick=()=>{selSI=i;cSI=i;document.getElementById('t-sn').textContent=s.name;showSnp(i);renderSubjs();};
    g.appendChild(d);
  });
}
function addSubj(){
  const v=document.getElementById('ns-inp').value.trim();if(!v)return;
  if(D.subjs.find(s=>s.name===v)){toast('এই সাবজেক্ট আগেই আছে');return;}
  D.subjs.push({name:v,mins:0,notes:{general:'',important:'',questions:'',exam:'',formula:''}});
  document.getElementById('ns-inp').value='';sv();renderSubjs();updAllDrops();toast(v+' যোগ হয়েছে!');
}
function delSubj(i){
  if(DS.includes(D.subjs[i].name)){toast('ডিফল্ট সাবজেক্ট মুছতে পারবে না');return;}
  D.subjs.splice(i,1);if(selSI>=D.subjs.length)selSI=-1;
  document.getElementById('snp').style.display='none';sv();renderSubjs();
}
function showSnp(i){
  const s=D.subjs[i];
  document.getElementById('snp').style.display='block';
  document.getElementById('snp-title').textContent=s.name+' — নোটস';
  document.getElementById('sn-ta').value=s.notes[snTag]||'';
}
function closeSnp(){document.getElementById('snp').style.display='none';selSI=-1;renderSubjs();}
function setSNT(t,el){snTag=t;document.querySelectorAll('#snt .tag').forEach(e=>e.classList.remove('on'));el.classList.add('on');if(selSI>=0)document.getElementById('sn-ta').value=D.subjs[selSI].notes[t]||'';}
function saveSnote(){if(selSI<0)return;D.subjs[selSI].notes[snTag]=document.getElementById('sn-ta').value;sv();}
function updAllDrops(){updTmSubj();updNSubjs();}

// ===== HOME =====
function updHome(){
  const d=new Date();
  const days=['রবিবার','সোমবার','মঙ্গলবার','বুধবার','বৃহস্পতিবার','শুক্রবার','শনিবার'];
  document.getElementById('h-date').textContent=days[d.getDay()]+', '+d.toLocaleDateString('bn-BD',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('h-quote').textContent=QUOTES[d.getDay()%QUOTES.length];
  const g=+document.getElementById('g-p').value||6;
  const pct=Math.min(100,Math.round(doneT/g*100));
  document.getElementById('h-today').textContent=doneT;
  document.getElementById('h-mins').textContent=(D.totalM||0)+'m';
  document.getElementById('h-str').textContent=(D.streak||0)+'🔥';
  document.getElementById('h-goal').textContent=pct+'%';
  document.getElementById('h-lv').textContent=D.lv||1;
  const xN=100*(D.lv||1);
  document.getElementById('h-xptxt').textContent=(D.xp||0)+'/'+xN+' XP';
  document.getElementById('h-xpf').style.width=Math.min(100,Math.round((D.xp||0)/xN*100))+'%';
  document.getElementById('h-xplbl').textContent=(D.xp||0)+' XP অর্জিত';
  updExam();updRev();updRem();renderBdg();
}
function updExam(){
  const ed=document.getElementById('e-date').value;
  const et=document.getElementById('e-type').value;
  document.getElementById('h-etype').textContent=et;
  if(ed){const df=Math.ceil((new Date(ed)-new Date())/864e5);document.getElementById('h-edays').textContent=df>0?df:'শেষ ✓';}
  else document.getElementById('h-edays').textContent='সেট করো';
}
function updRev(){
  const sm=D.sm||{};
  const sorted=[...D.subjs].sort((a,b)=>(sm[a.name]||0)-(sm[b.name]||0));
  const last=D.log[0];
  let msg='';
  if(!last)msg='শুরু করো "'+sorted[0].name+'" দিয়ে!';
  else if((sm[sorted[0].name]||0)<5)msg='"'+sorted[0].name+'" অনেকদিন পড়া হয়নি — আজ এটা পড়ো!';
  else msg='"'+last.sj+'" পরে এখন "'+sorted[1].name+'" পড়লে ভালো হবে।';
  document.getElementById('h-rev').textContent=msg;
}
function updRem(){
  const sm=D.sm||{};
  const neg=D.subjs.filter(s=>!(sm[s.name]));
  const el=document.getElementById('h-rem');
  if(neg.length>0){el.style.display='block';el.textContent='⚠️ এখনো পড়া হয়নি: '+neg.slice(0,3).map(s=>s.name).join(', ')+(neg.length>3?' + '+(neg.length-3)+'টি':'');}
  else el.style.display='none';
}
function renderBdg(){
  document.getElementById('h-bdg').innerHTML=ACH.map(a=>`<div class="bdg${a.c(D)?' on':''}">${a.e} ${a.l}</div>`).join('');
}

// ===== STATS =====
function updStats(){
  document.getElementById('s-tod').textContent=doneT;
  document.getElementById('s-tot').textContent=(D.totalM||0)+'m';
  document.getElementById('s-str').textContent=D.streak||0;
  const sm=D.sm||{};let fav='—',mx=0;Object.entries(sm).forEach(([k,v])=>{if(v>mx){mx=v;fav=k;}});
  document.getElementById('s-fav').textContent=fav;
  const all=D.todos||[],dn=all.filter(t=>t.done).length;
  document.getElementById('s-tdt').textContent=all.length;
  document.getElementById('s-tdd').textContent=dn;
  document.getElementById('s-tdp').textContent=all.length-dn;
  renderWk();renderSS();renderLog();
}
function renderWk(){
  const days=['রবি','সোম','মঙ্গল','বুধ','বৃহস্পতি','শুক্র','শনি'],td=new Date().getDay();
  const mx=Math.max(...D.wk,1);
  const c=document.getElementById('s-week');c.innerHTML='';
  D.wk.forEach((v,i)=>{
    const h=Math.round(v/mx*78)+3;
    const col=document.createElement('div');col.className='bc';
    col.innerHTML=`<div class="bval">${v>0?v:''}</div><div class="bf${i===td?' td':''}" style="height:${h}px"></div><div class="bd">${days[i]}</div>`;
    c.appendChild(col);
  });
}
function renderSS(){
  const sm=D.sm||{},mx=Math.max(...Object.values(sm),1);
  const sorted=Object.entries(sm).sort((a,b)=>b[1]-a[1]).slice(0,6);
  document.getElementById('s-slist').innerHTML=sorted.length?sorted.map(([n,m])=>`<div class="ssr"><div class="ssrn">${n}</div><div class="ssrb"><div class="ssrf" style="width:${Math.round(m/mx*100)}%"></div></div><div class="ssrv">${m}m</div></div>`).join(''):'<div style="font-size:12px;color:var(--text3);padding:6px 0">এখনো কোনো পড়া নেই</div>';
}
function renderLog(){
  const c=document.getElementById('s-log');
  c.innerHTML=D.log&&D.log.length?D.log.slice(0,12).map(l=>`<div class="li"><span style="color:var(--p2)">📚 ${l.sj}</span><div style="text-align:right"><div>${l.m}m</div><div style="font-size:10px;color:var(--text3)">${l.t}</div></div></div>`).join(''):'<div style="font-size:12px;color:var(--text3);text-align:center;padding:8px">এখনো কোনো সেশন নেই</div>';
}
function clearStats(){
  if(!confirm('সব পরিসংখ্যান মুছবে?'))return;
  D.totalM=0;D.todayS=0;D.totalS=0;D.streak=0;D.xp=0;D.lv=1;doneT=0;
  D.wk=[0,0,0,0,0,0,0];D.log=[];D.sm={};D.lastD='';
  D.subjs.forEach(s=>s.mins=0);
  sv();updStats();updHome();renderDots();updTI();toast('সব মুছে ফেলা হয়েছে');
}

// ===== SETTINGS =====
function saveSt(){D.eDate=document.getElementById('e-date').value;D.eType=document.getElementById('e-type').value;D.gP=+document.getElementById('g-p').value||6;D.gH=+document.getElementById('g-h').value||3;sv();}
function setTheme(t,el){
  document.querySelectorAll('.to').forEach(e=>e.classList.remove('on'));el.classList.add('on');
  D.theme=t;const r=document.documentElement,th=THEMES[t]||THEMES.dark;
  r.style.setProperty('--bg',th.bg);r.style.setProperty('--bg2',th.bg2);r.style.setProperty('--bg3',th.bg3);sv();
}

// ===== NAV =====
function goTo(pg){
  document.querySelectorAll('.page').forEach(p=>{p.classList.remove('on');});
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+pg).classList.add('on');
  document.getElementById('nav-'+pg).classList.add('on');
  if(pg==='home')updHome();
  if(pg==='stats')updStats();
  if(pg==='subjects'){renderSubjs();updAllDrops();}
  if(pg==='todo'){updTmSubj();renderTodo();}
  if(pg==='notes'){updNSubjs();renderNotes();}
}

// ===== TOAST =====
let tT;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),3000);
}

// ===== INIT =====
ld();
doneT=D.todayS||0;
if(D.eDate)document.getElementById('e-date').value=D.eDate;
if(D.eType)document.getElementById('e-type').value=D.eType;
if(D.gP){document.getElementById('g-p').value=D.gP;document.getElementById('g-pv').textContent=D.gP;}
if(D.gH){document.getElementById('g-h').value=D.gH;document.getElementById('g-hv').textContent=D.gH+'h';}
if(D.snd)selSnd(D.snd);
if(D.theme){const el=document.querySelector('.to[onclick*="\''+D.theme+'\'"]');if(el)setTheme(D.theme,el);}
document.getElementById('n-body').addEventListener('input',updNCnt);
resetT();renderDots();updTI();updHome();
document.getElementById('t-sn').textContent=D.subjs[0].name;
</script>
</body>
</html>
